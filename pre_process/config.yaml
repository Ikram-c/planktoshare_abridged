stream:
  tar_paths:
    - ""
  output_format: "numpy"
  max_images: null
  min_size: [128, 128]
  max_size: [16384, 16384]
  convert_mode: null
  extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".tif"
    - ".bmp"
    - ".webp"

concurrency:
  enabled: true
  max_workers: 8
  chunk_size: 100

grouper:
  tile_size: 300
  snap_grid: null
  snap_mode: "ceil"
  min_bucket_size: 1
  max_bucket_size: null
  pad_to_bucket: true

filter:
  checkpoint_path: "models/bubble_autoencoder.pth"
  threshold: 0.5
  spot_sigma: 3.5
  outline_sigma: 1.0
  device: "cpu"
  fallback_to_skimage: true

rule_filter:
  spot_sigma: 3.5
  outline_sigma: 1.0
  fallback_to_skimage: true
  local_background: false
  annulus_width: 10
  mod_threshold: 0.02
  intensity_ratio_min: 0.90
  solidity_min: 0.95
  eccentricity_max: 0.30
  gradient_rms_max: null
  intensity_std_max: null
  score_weights: [0.4, 0.2, 0.2, 0.2]
  score_threshold: 0.70

zarr_writer:
  output_dir: "output/zarr"
  tile_size: 300
  compression_codec: "blosc_zstd"
  compression_level: 5
  shuffle: "bitshuffle"
  zarr_format: 2
  dimension_separator: "/"

ome_converter:
  output_dir: "output/ome_zarr"
  pixel_size_um: 0.36
  generate_pyramid: true
  pyramid_levels: 3
  pyramid_downsample_factor: 2
  zip_store: true
  tile_size: 300